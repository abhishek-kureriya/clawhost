#cloud-config
# Hetzner cloud-init bootstrap for ClawHost
# Runs once on first boot as root.

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - build-essential
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw
  - jq
  - unzip
  - ca-certificates
  - gnupg
  - lsb-release
  - htop

write_files:
  - path: /opt/clawhost/bootstrap.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      LOG=/var/log/clawhost-bootstrap.log
      exec > >(tee -a "$LOG") 2>&1
      echo "=== ClawHost Bootstrap Started: $(date) ==="

      REPO_URL="${repo_url}"
      GO_VERSION="${go_version}"
      NODE_VERSION="${node_version}"
      INSTALL_DIR="/opt/clawhost/app"
      GO_DIR="/usr/local/go"

      # -----------------------------------------------------------------------
      # 1. Docker
      # -----------------------------------------------------------------------
      echo "[1/5] Installing Docker..."
      if ! command -v docker &>/dev/null; then
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
          > /etc/apt/sources.list.d/docker.list
        apt-get update -qq
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
        systemctl enable --now docker
      fi

      # -----------------------------------------------------------------------
      # 2. Node.js (for npx MCP servers)
      # -----------------------------------------------------------------------
      echo "[2/7] Installing Node.js $NODE_VERSION..."
      if ! command -v node &>/dev/null; then
        curl -fsSL "https://deb.nodesource.com/setup_$${NODE_VERSION}.x" | bash -
        apt-get install -y nodejs
      fi

      # -----------------------------------------------------------------------
      # 3. Go
      # -----------------------------------------------------------------------
      echo "[3/5] Installing Go $GO_VERSION..."
      if [ ! -d "$GO_DIR" ]; then
        ARCH=$(dpkg --print-architecture)
        [ "$ARCH" = "amd64" ] && GOARCH="amd64" || GOARCH="arm64"
        curl -fsSL "https://go.dev/dl/go$${GO_VERSION}.linux-$${GOARCH}.tar.gz" \
          -o /tmp/go.tar.gz
        tar -C /usr/local -xzf /tmp/go.tar.gz
        rm /tmp/go.tar.gz
      fi
      export PATH="$GO_DIR/bin:$PATH"
      export HOME="/root"
      export GOPATH="/root/go"
      export GOMODCACHE="/root/go/pkg/mod"
      export GOCACHE="/root/.cache/go-build"
      mkdir -p "$GOPATH" "$GOCACHE"
      echo "export PATH=/usr/local/go/bin:\$PATH" >> /etc/profile.d/golang.sh
      echo "export GOPATH=/root/go" >> /etc/profile.d/golang.sh

      # -----------------------------------------------------------------------
      # 4. Clone & build ClawHost
      # -----------------------------------------------------------------------
      echo "[4/5] Cloning repo..."
      if [ -d "$INSTALL_DIR/.git" ]; then
        cd "$INSTALL_DIR" && git pull
      else
        git clone "$REPO_URL" "$INSTALL_DIR"
      fi

      echo "[4/5] Building ClawHost core..."
      cd "$INSTALL_DIR/core"
      /usr/local/go/bin/go mod download
      /usr/local/go/bin/go build -o /usr/local/bin/clawhost-core ./cmd
      cd "$INSTALL_DIR"

      # -----------------------------------------------------------------------
      # 5. Systemd service for ClawHost Core API
      # -----------------------------------------------------------------------
      echo "[5/5] Configuring systemd and firewall..."
      systemctl daemon-reload
      systemctl enable --now clawhost-core

      # Firewall
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw --force enable

      echo "=== Bootstrap Complete: $(date) ==="
      echo "Core API -> http://$(curl -s ifconfig.me):8080"
      echo "Use POST /api/v1/provision with provider=local to install OpenClaw"

  - path: /etc/systemd/system/clawhost-core.service
    permissions: "0644"
    content: |
      [Unit]
      Description=ClawHost Core API
      After=network.target docker.service
      Requires=docker.service

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/clawhost/app
      EnvironmentFile=-/opt/clawhost/app/.env
      ExecStart=/usr/local/bin/clawhost-core
      Restart=always
      RestartSec=5
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

runcmd:
  - /opt/clawhost/bootstrap.sh
