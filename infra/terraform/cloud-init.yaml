#cloud-config
# Hetzner cloud-init bootstrap for ClawHost
# Runs once on first boot as root.

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - build-essential
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw
  - jq
  - unzip
  - ca-certificates
  - gnupg
  - lsb-release
  - htop

write_files:
  - path: /opt/clawhost/bootstrap.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      LOG=/var/log/clawhost-bootstrap.log
      exec > >(tee -a "$LOG") 2>&1
      echo "=== ClawHost Bootstrap Started: $(date) ==="

      REPO_URL="${repo_url}"
      GO_VERSION="${go_version}"
      NODE_VERSION="${node_version}"
      INSTALL_DIR="/opt/clawhost/app"
      GO_DIR="/usr/local/go"
      API_DOMAIN="${api_domain}"
      APP_DOMAIN="${app_domain}"
      LE_EMAIL="${letsencrypt_email}"

      # -----------------------------------------------------------------------
      # 1. Docker
      # -----------------------------------------------------------------------
      echo "[1/5] Installing Docker..."
      if ! command -v docker &>/dev/null; then
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
          > /etc/apt/sources.list.d/docker.list
        apt-get update -qq
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
        systemctl enable --now docker
      fi

      # -----------------------------------------------------------------------
      # 2. Node.js (for npx MCP servers)
      # -----------------------------------------------------------------------
      echo "[2/7] Installing Node.js $NODE_VERSION..."
      if ! command -v node &>/dev/null; then
        curl -fsSL "https://deb.nodesource.com/setup_$${NODE_VERSION}.x" | bash -
        apt-get install -y nodejs
      fi

      # -----------------------------------------------------------------------
      # 3. Go
      # -----------------------------------------------------------------------
      echo "[3/5] Installing Go $GO_VERSION..."
      if [ ! -d "$GO_DIR" ]; then
        ARCH=$(dpkg --print-architecture)
        [ "$ARCH" = "amd64" ] && GOARCH="amd64" || GOARCH="arm64"
        curl -fsSL "https://go.dev/dl/go$${GO_VERSION}.linux-$${GOARCH}.tar.gz" \
          -o /tmp/go.tar.gz
        tar -C /usr/local -xzf /tmp/go.tar.gz
        rm /tmp/go.tar.gz
      fi
      export PATH="$GO_DIR/bin:$PATH"
      export HOME="/root"
      export GOPATH="/root/go"
      export GOMODCACHE="/root/go/pkg/mod"
      export GOCACHE="/root/.cache/go-build"
      mkdir -p "$GOPATH" "$GOCACHE"
      echo "export PATH=/usr/local/go/bin:\$PATH" >> /etc/profile.d/golang.sh
      echo "export GOPATH=/root/go" >> /etc/profile.d/golang.sh

      # -----------------------------------------------------------------------
      # 4. Clone & build ClawHost
      # -----------------------------------------------------------------------
      echo "[4/5] Cloning repo..."
      if [ -d "$INSTALL_DIR/.git" ]; then
        cd "$INSTALL_DIR" && git pull
      else
        git clone "$REPO_URL" "$INSTALL_DIR"
      fi

      echo "[4/5] Building ClawHost core..."
      cd "$INSTALL_DIR/core"
      /usr/local/go/bin/go mod download
      /usr/local/go/bin/go build -o /usr/local/bin/clawhost-core ./cmd
      cd "$INSTALL_DIR"

      # -----------------------------------------------------------------------
      # 5. Systemd service for ClawHost Core API
      # -----------------------------------------------------------------------
      echo "[5/5] Configuring systemd and firewall..."
      systemctl daemon-reload
      systemctl enable --now clawhost-core

      # Firewall
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw --force enable

      # -----------------------------------------------------------------------
      # Write nginx config and attempt SSL
      # (nginx Docker container starts later via POST /api/v1/provision)
      # -----------------------------------------------------------------------
      NGINX_CONF="$INSTALL_DIR/infra/nginx/nginx.conf"
      mkdir -p "$INSTALL_DIR/infra/nginx"

      if [ -n "$API_DOMAIN" ] && [ -n "$APP_DOMAIN" ]; then
        echo "Writing nginx config for $API_DOMAIN and $APP_DOMAIN..."

        # Attempt certbot while port 80 is free (Docker nginx not running yet)
        SSL_API=0
        SSL_APP=0
        if [ -n "$LE_EMAIL" ]; then
          echo "  Attempting SSL via Let's Encrypt..."
          certbot certonly --standalone --non-interactive --agree-tos \
            -m "$LE_EMAIL" -d "$API_DOMAIN" && SSL_API=1 || true
          certbot certonly --standalone --non-interactive --agree-tos \
            -m "$LE_EMAIL" -d "$APP_DOMAIN" && SSL_APP=1 || true
        fi

        # Build nginx server blocks
        API_SSL_BLOCK=""
        APP_SSL_BLOCK=""

        if [ $SSL_API -eq 1 ]; then
          API_SSL_BLOCK=$(cat <<SSLEOF
server {
    listen 80;
    server_name $API_DOMAIN;
    return 301 https://\$host\$request_uri;
}
server {
    listen 443 ssl;
    server_name $API_DOMAIN;
    ssl_certificate     /etc/letsencrypt/live/$API_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$API_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    location / {
        proxy_pass         http://core_api;
        proxy_set_header   Host \$host;
        proxy_set_header   X-Real-IP \$remote_addr;
        proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto \$scheme;
        proxy_read_timeout 60s;
    }
}
SSLEOF
)
        else
          API_SSL_BLOCK=$(cat <<HTTPEOF
server {
    listen 80;
    server_name $API_DOMAIN;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / {
        proxy_pass         http://core_api;
        proxy_set_header   Host \$host;
        proxy_set_header   X-Real-IP \$remote_addr;
        proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
HTTPEOF
)
        fi

        if [ $SSL_APP -eq 1 ]; then
          APP_SSL_BLOCK=$(cat <<SSLEOF2
server {
    listen 80;
    server_name $APP_DOMAIN;
    return 301 https://\$host\$request_uri;
}
server {
    listen 443 ssl;
    server_name $APP_DOMAIN;
    ssl_certificate     /etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$APP_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    location / {
        proxy_pass         http://openclaw;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade \$http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host \$host;
        proxy_set_header   X-Real-IP \$remote_addr;
        proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto \$scheme;
        proxy_read_timeout 300s;
    }
}
SSLEOF2
)
        else
          APP_SSL_BLOCK=$(cat <<HTTPEOF2
server {
    listen 80;
    server_name $APP_DOMAIN;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / {
        proxy_pass         http://openclaw;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade \$http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host \$host;
        proxy_set_header   X-Real-IP \$remote_addr;
        proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}
HTTPEOF2
)
        fi

        cat > "$NGINX_CONF" <<NGINXEOF
upstream core_api { server host.docker.internal:8080; }
upstream openclaw  { server openclaw:8080; }

$API_SSL_BLOCK

$APP_SSL_BLOCK
NGINXEOF

        [ $SSL_API -eq 1 ] && echo "  SSL enabled for $API_DOMAIN" || echo "  WARNING: SSL not obtained for $API_DOMAIN. Run POST /api/v1/ssl/enable after DNS propagates."
        [ $SSL_APP -eq 1 ] && echo "  SSL enabled for $APP_DOMAIN" || echo "  WARNING: SSL not obtained for $APP_DOMAIN. Run POST /api/v1/ssl/enable after DNS propagates."
      else
        echo "No domains configured -- keeping default nginx config (IP-based)."
      fi

      echo "=== Bootstrap Complete: $(date) ==="
      SERVER_IP=$(curl -s ifconfig.me)
      if [ -n "$API_DOMAIN" ]; then
        echo "Core API -> https://$API_DOMAIN (or http://$SERVER_IP:8080)"
        echo "OpenClaw -> https://$APP_DOMAIN (after provisioning)"
      else
        echo "Core API -> http://$SERVER_IP:8080"
        echo "OpenClaw -> http://$SERVER_IP:3000 (after provisioning)"
      fi
      echo "To install OpenClaw: POST /api/v1/provision"
      echo "To enable/renew SSL: POST /api/v1/ssl/enable"

  - path: /etc/systemd/system/clawhost-core.service
    permissions: "0644"
    content: |
      [Unit]
      Description=ClawHost Core API
      After=network.target docker.service
      Requires=docker.service

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/clawhost/app
      EnvironmentFile=-/opt/clawhost/app/.env
      ExecStart=/usr/local/bin/clawhost-core
      Restart=always
      RestartSec=5
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

runcmd:
  - /opt/clawhost/bootstrap.sh
