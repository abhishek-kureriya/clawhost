#cloud-config
# ClawHost bootstrap for DigitalOcean / Hetzner
# Runs once on first boot as root.

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - build-essential
  - certbot
  - ufw
  - jq
  - unzip
  - ca-certificates
  - gnupg
  - lsb-release
  - htop

write_files:
  - path: /opt/clawhost/app/infra/nginx/nginx.conf
    permissions: "0644"
    content: |
      upstream core_api { server host.docker.internal:8080; }
      upstream openclaw  { server openclaw:8080; }
      server {
          listen 80;
          server_name ${api_domain_or_underscore};
          location /.well-known/acme-challenge/ { root /var/www/certbot; }
          location / {
              proxy_pass         http://core_api;
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 60s;
          }
      }
      server {
          listen 80;
          server_name ${app_domain_or_underscore};
          location /.well-known/acme-challenge/ { root /var/www/certbot; }
          location / {
              proxy_pass         http://openclaw;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 300s;
          }
      }

  - path: /etc/systemd/system/clawhost-core.service
    permissions: "0644"
    content: |
      [Unit]
      Description=ClawHost Core API
      After=network.target docker.service
      Wants=docker.service

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/clawhost/app
      EnvironmentFile=-/opt/clawhost/app/.env
      ExecStart=/usr/local/bin/clawhost-core
      Restart=always
      RestartSec=5
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /opt/clawhost/bootstrap.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      LOG=/var/log/clawhost-bootstrap.log
      exec > >(tee -a "$LOG") 2>&1
      echo "=== ClawHost Bootstrap Started: $(date) ==="

      REPO_URL="${repo_url}"
      GO_VERSION="${go_version}"
      NODE_VERSION="${node_version}"
      API_DOMAIN="${api_domain}"
      APP_DOMAIN="${app_domain}"
      LE_EMAIL="${letsencrypt_email}"
      INSTALL_DIR="/opt/clawhost/app"
      GO_DIR="/usr/local/go"

      echo "[1/5] Installing Docker..."
      if ! command -v docker &>/dev/null; then
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
          > /etc/apt/sources.list.d/docker.list
        apt-get update -qq
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
        systemctl enable --now docker
      fi

      echo "[2/5] Installing Node.js $NODE_VERSION..."
      if ! command -v node &>/dev/null; then
        curl -fsSL "https://deb.nodesource.com/setup_$NODE_VERSION.x" | bash -
        apt-get install -y nodejs
      fi

      echo "[3/5] Installing Go $GO_VERSION..."
      if [ ! -d "$GO_DIR" ]; then
        ARCH=$(dpkg --print-architecture)
        [ "$ARCH" = "amd64" ] && GOARCH="amd64" || GOARCH="arm64"
        curl -fsSL "https://go.dev/dl/go$GO_VERSION.linux-$GOARCH.tar.gz" \
          -o /tmp/go.tar.gz
        tar -C /usr/local -xzf /tmp/go.tar.gz
        rm /tmp/go.tar.gz
      fi
      export PATH="$GO_DIR/bin:$PATH"
      export HOME="/root"
      export GOPATH="/root/go"
      export GOMODCACHE="/root/go/pkg/mod"
      export GOCACHE="/root/.cache/go-build"
      mkdir -p "$GOPATH" "$GOCACHE"
      echo "export PATH=/usr/local/go/bin:\$PATH" > /etc/profile.d/golang.sh
      echo "export GOPATH=/root/go" >> /etc/profile.d/golang.sh

      echo "[4/5] Cloning and building..."
      if [ -d "$INSTALL_DIR/.git" ]; then
        cd "$INSTALL_DIR" && git pull
      else
        git clone "$REPO_URL" "$INSTALL_DIR"
      fi
      cd "$INSTALL_DIR/core"
      /usr/local/go/bin/go mod download
      /usr/local/go/bin/go build -o /usr/local/bin/clawhost-core ./cmd

      echo "[5/5] Systemd, firewall, SSL..."
      systemctl daemon-reload
      systemctl enable --now clawhost-core

      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw --force enable

      if [ -n "$API_DOMAIN" ] && [ -n "$APP_DOMAIN" ] && [ -n "$LE_EMAIL" ]; then
        echo "Attempting SSL for $API_DOMAIN and $APP_DOMAIN..."
        mkdir -p /var/www/certbot
        certbot certonly --standalone --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$API_DOMAIN" && echo "SSL OK: $API_DOMAIN" || echo "WARNING: SSL failed for $API_DOMAIN"
        certbot certonly --standalone --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" && echo "SSL OK: $APP_DOMAIN" || echo "WARNING: SSL failed for $APP_DOMAIN"
      fi

      echo "=== Bootstrap Complete: $(date) ==="
      SERVER_IP=$(curl -s ifconfig.me)
      if [ -n "$API_DOMAIN" ]; then
        echo "Core API -> http://$API_DOMAIN  (http://$SERVER_IP:8080)"
        echo "OpenClaw -> http://$APP_DOMAIN  (after POST /api/v1/provision)"
      else
        echo "Core API -> http://$SERVER_IP:8080"
        echo "OpenClaw -> http://$SERVER_IP:3000  (after POST /api/v1/provision)"
      fi
      echo "Enable SSL: POST /api/v1/ssl/enable"

runcmd:
  - /opt/clawhost/bootstrap.sh
