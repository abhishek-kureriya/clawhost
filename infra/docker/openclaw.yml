name: openclaw

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — shared by OpenClaw and ClawHost Core API
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: clawhost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-clawhost}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-clawhost_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/clawhost/app/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clawhost}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clawhost

  # ---------------------------------------------------------------------------
  # OpenClaw — AI agent / chat UI
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/open-webui/open-webui:main   # swap with your private image if needed
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      # Point OpenClaw at an external LLM provider
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      # Internal ClawHost Core API
      CLAWHOST_API_URL: http://clawhost-core:8080
      # Database
      DATABASE_URL: postgresql://${DB_USER:-clawhost}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-clawhost_db}
      # Security
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY is required}
    volumes:
      - openclaw_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clawhost

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy (HTTP; add SSL via certbot separately)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: clawhost-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/clawhost/app/infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - openclaw
    networks:
      - clawhost

volumes:
  postgres_data:
  openclaw_data:
  nginx_cache:

networks:
  clawhost:
    driver: bridge
