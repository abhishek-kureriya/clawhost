# ClawHost nginx config
# Generated by cloud-init with domain variables.
# This file is the fallback used when no domains are configured (IP-based access).
# When api_domain/app_domain are set in terraform.tfvars, cloud-init overwrites
# this file with domain-specific server blocks.

upstream core_api { server host.docker.internal:8080; }
upstream openclaw  { server openclaw:8080; }

# Core API
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Core API on /api/
    location /api/ {
        proxy_pass         http://core_api/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass         http://core_api/health;
        proxy_set_header   Host $host;
    }

    # OpenClaw UI
    location / {
        proxy_pass         http://openclaw;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}
